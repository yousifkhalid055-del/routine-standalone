<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="روتيني" />
  <link rel="manifest" href="manifest.json" />
  <title>روتيني اليومي</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    button:active { opacity: 0.8; }
    input[type=range] { -webkit-appearance: none; height: 6px; border-radius: 99px; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; }
    input[type=text] { outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const PRAYER_IDS = ["fajr", "dhuhr", "asr", "maghrib", "isha"];
    const PRAYERS_META = {
      fajr:    { label: "الفجر",   icon: "🌙" },
      dhuhr:   { label: "الظهر",   icon: "☀️" },
      asr:     { label: "العصر",   icon: "🌤" },
      maghrib: { label: "المغرب",  icon: "🌇" },
      isha:    { label: "العشاء",  icon: "⭐" },
    };

    const DEFAULT_WEIGHTS = { prayers: 50, exercise: 30, reading: 20 };
    const DEFAULT_JAMAA_RATIO = 0.6;

    const QUOTES = [
      "كل يوم ملتزم هو لبنة في بناء نفسك",
      "الانضباط اليوم حرية الغد",
      "الناجحون لا يشعرون بالتحفيز دائماً، لكنهم يتصرفون رغم ذلك",
      "الروتين الجيد يصنع الإنسان العظيم",
      "ابدأ صغيراً، وكن ثابتاً، والنتائج ستبهرك",
    ];

    function getTodayKey() { return new Date().toISOString().split("T")[0]; }

    function calcDayScore(dayData, weights, jamaaRatio, customHabits) {
      let score = 0;
      const perPrayer = weights.prayers / 5;
      PRAYER_IDS.forEach(id => {
        const state = dayData?.[id];
        if (state === "jamaa") score += perPrayer;
        else if (state === "solo") score += perPrayer * jamaaRatio;
      });
      if (dayData?.exercise) score += weights.exercise;
      score += ((dayData?.readingPct ?? 0) / 100) * weights.reading;
      // custom habits
      (customHabits || []).forEach(h => {
        if (dayData?.[`custom_${h.id}`]) score += h.value; // value can be negative
      });
      return Math.min(100, Math.round(score));
    }

    function getStreak(history, weights, jamaaRatio, customHabits) {
      let streak = 0;
      const today = new Date();
      for (let i = 0; i < 365; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        const key = d.toISOString().split("T")[0];
        if (i === 0 && !history[key]) break;
        if (!history[key]) break;
        if (calcDayScore(history[key], weights, jamaaRatio, customHabits) < 100) break;
        streak++;
      }
      return streak;
    }

    function getLast7(history, weights, jamaaRatio, customHabits) {
      const days = [];
      const today = new Date();
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        const key = d.toISOString().split("T")[0];
        const score = calcDayScore(history[key] || {}, weights, jamaaRatio, customHabits);
        const label = d.toLocaleDateString("ar-SA", { weekday: "short" });
        days.push({ key, score, label, isToday: i === 0 });
      }
      return days;
    }

    function ScoreRing({ score, dark }) {
      const r = 54, circ = 2 * Math.PI * r;
      const dash = (score / 100) * circ;
      const color = score >= 90 ? "#c9a84c" : score >= 70 ? "#4caf8a" : score >= 50 ? "#7a5fd4" : "#c0392b";
      return (
        <svg width={130} height={130} viewBox="0 0 130 130" style={{ transform: "rotate(-90deg)" }}>
          <circle cx={65} cy={65} r={r} fill="none" stroke={dark ? "#1a1a24" : "#e0e0e8"} strokeWidth={10} />
          <circle cx={65} cy={65} r={r} fill="none" stroke={color} strokeWidth={10}
            strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
            style={{ transition: "stroke-dasharray 0.8s ease, stroke 0.4s" }} />
        </svg>
      );
    }

    function App() {
      const [page, setPage] = useState("home");
      const [settingsTab, setSettingsTab] = useState("general"); // "general" | "habits"
      const [darkMode, setDarkMode] = useState(() => {
        const v = localStorage.getItem("rdark");
        return v === null ? true : v === "1";
      });
      const [weights, setWeights] = useState(() => {
        try { return JSON.parse(localStorage.getItem("rw") || "null") || DEFAULT_WEIGHTS; }
        catch { return DEFAULT_WEIGHTS; }
      });
      const [jamaaRatio, setJamaaRatio] = useState(() => {
        const v = parseFloat(localStorage.getItem("rj"));
        return isNaN(v) ? DEFAULT_JAMAA_RATIO : v;
      });
      const [history, setHistory] = useState(() => {
        try { return JSON.parse(localStorage.getItem("rh") || "{}"); }
        catch { return {}; }
      });
      const [customHabits, setCustomHabits] = useState(() => {
        try { return JSON.parse(localStorage.getItem("rch") || "[]"); }
        catch { return []; }
      });
      // new habit form
      const [newHabit, setNewHabit] = useState({ label: "", icon: "⭐", value: 10, type: "add" });

      const todayKey = getTodayKey();
      const todayData = history[todayKey] || {};
      const score = calcDayScore(todayData, weights, jamaaRatio, customHabits);
      const streak = getStreak(history, weights, jamaaRatio, customHabits);
      const last7 = getLast7(history, weights, jamaaRatio, customHabits);
      const quote = QUOTES[new Date().getDay() % QUOTES.length];
      const totalW = weights.prayers + weights.exercise + weights.reading;
      const remaining = 100 - totalW;

      useEffect(() => { localStorage.setItem("rh", JSON.stringify(history)); }, [history]);
      useEffect(() => { localStorage.setItem("rw", JSON.stringify(weights)); }, [weights]);
      useEffect(() => { localStorage.setItem("rj", String(jamaaRatio)); }, [jamaaRatio]);
      useEffect(() => { localStorage.setItem("rch", JSON.stringify(customHabits)); }, [customHabits]);
      useEffect(() => { localStorage.setItem("rdark", darkMode ? "1" : "0"); }, [darkMode]);

      // theme colors
      const t = darkMode ? {
        bg: "#0a0a0f", card: "#0e0e16", border: "#1e1e2a", text: "#e8e0d0",
        sub: "#6b6580", faint: "#3a3a4a", inputBg: "#0a0a12", gold: "#c9a84c",
        green: "#4caf8a", purple: "#7a5fd4", red: "#c0392b",
      } : {
        bg: "#f0ede8", card: "#ffffff", border: "#ddd8d0", text: "#2a2520",
        sub: "#7a7070", faint: "#aaa090", inputBg: "#f5f2ee", gold: "#b8860b",
        green: "#2d8a5e", purple: "#5a3faa", red: "#a02020",
      };

      function cyclePrayer(id) {
        const cur = todayData[id];
        const next = cur === undefined ? "solo" : cur === "solo" ? "jamaa" : undefined;
        setHistory(prev => ({ ...prev, [todayKey]: { ...prev[todayKey], [id]: next } }));
      }
      function toggleExercise() {
        setHistory(prev => ({ ...prev, [todayKey]: { ...prev[todayKey], exercise: !prev[todayKey]?.exercise } }));
      }
      function setReadingPct(val) {
        setHistory(prev => ({ ...prev, [todayKey]: { ...prev[todayKey], readingPct: val } }));
      }
      function toggleCustom(hid) {
        setHistory(prev => ({ ...prev, [todayKey]: { ...prev[todayKey], [`custom_${hid}`]: !prev[todayKey]?.[`custom_${hid}`] } }));
      }
      function addHabit() {
        if (!newHabit.label.trim()) return;
        const habit = {
          id: Date.now().toString(),
          label: newHabit.label.trim(),
          icon: newHabit.icon || "⭐",
          value: newHabit.type === "add" ? Math.abs(newHabit.value) : -Math.abs(newHabit.value),
        };
        setCustomHabits(prev => [...prev, habit]);
        setNewHabit({ label: "", icon: "⭐", value: 10, type: "add" });
      }
      function deleteHabit(id) {
        setCustomHabits(prev => prev.filter(h => h.id !== id));
      }

      const scoreColor = score >= 90 ? t.gold : score >= 70 ? t.green : score >= 50 ? t.purple : t.red;
      const scoreLabel = score >= 90 ? "ممتاز 🏆" : score >= 70 ? "جيد جداً ⚡" : score >= 50 ? "مقبول 📈" : "ضعيف 💪";
      const font = { fontFamily: "'Noto Naskh Arabic','Amiri',Georgia,serif" };
      const card = { background: t.card, border: `1px solid ${t.border}`, borderRadius: 18, padding: "16px 18px", marginBottom: 14 };
      const secLabel = { fontSize: 11, letterSpacing: 3, color: t.sub, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 };

      // ── SETTINGS ──
      if (page === "settings") return (
        <div style={{ minHeight: "100vh", background: t.bg, color: t.text, direction: "rtl", ...font }}>
          <div style={{ maxWidth: 480, margin: "0 auto", padding: "24px 16px 70px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
              <button onClick={() => setPage("home")} style={{ background: "none", border: `1px solid ${t.border}`, borderRadius: 10, color: t.gold, padding: "6px 14px", cursor: "pointer", fontSize: 13 }}>← رجوع</button>
              <h2 style={{ margin: 0, fontSize: 20, color: t.text }}>الإعدادات</h2>
            </div>

            {/* tabs */}
            <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
              {[{ id: "general", label: "عام" }, { id: "habits", label: "العادات المخصصة" }].map(tab => (
                <button key={tab.id} onClick={() => setSettingsTab(tab.id)} style={{
                  flex: 1, padding: "10px", borderRadius: 12, cursor: "pointer", fontSize: 13, fontWeight: 600,
                  background: settingsTab === tab.id ? t.gold : t.card,
                  border: `1px solid ${settingsTab === tab.id ? t.gold : t.border}`,
                  color: settingsTab === tab.id ? "#fff" : t.sub,
                  transition: "all 0.2s",
                }}>{tab.label}</button>
              ))}
            </div>

            {settingsTab === "general" && <>
              {/* dark/light mode */}
              <div style={card}>
                <div style={{ fontSize: 13, color: t.gold, marginBottom: 14, fontWeight: 700 }}>مظهر التطبيق</div>
                <div style={{ display: "flex", gap: 10 }}>
                  {[{ id: true, label: "🌙 الوضع الليلي" }, { id: false, label: "☀️ الوضع النهاري" }].map(m => (
                    <button key={String(m.id)} onClick={() => setDarkMode(m.id)} style={{
                      flex: 1, padding: "12px 8px", borderRadius: 12, cursor: "pointer", fontSize: 13, fontWeight: 600,
                      background: darkMode === m.id ? t.gold + "20" : t.inputBg,
                      border: `2px solid ${darkMode === m.id ? t.gold : t.border}`,
                      color: darkMode === m.id ? t.gold : t.sub,
                      transition: "all 0.2s",
                    }}>{m.label}</button>
                  ))}
                </div>
              </div>

              {/* weights */}
              <div style={card}>
                <div style={{ fontSize: 13, color: t.gold, marginBottom: 4, fontWeight: 700 }}>توزيع النسب (المجموع: {totalW}%)</div>
                {remaining !== 0 && (
                  <div style={{ fontSize: 11, color: remaining > 0 ? "#e67e22" : t.red, background: darkMode ? "#1a1000" : "#fff3e0", borderRadius: 8, padding: "6px 10px", marginBottom: 12 }}>
                    {remaining > 0 ? `⚠️ تبقى ${remaining}% غير موزعة` : `⚠️ تجاوزت الـ 100% بمقدار ${-remaining}%`}
                  </div>
                )}
                {[{ key: "prayers", label: "الصلوات 🕌", color: t.gold }, { key: "exercise", label: "التمرين 💪", color: t.green }, { key: "reading", label: "القراءة 📖", color: t.purple }].map(({ key, label, color }) => (
                  <div key={key} style={{ marginBottom: 20 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                      <span style={{ fontSize: 13 }}>{label}</span>
                      <span style={{ fontSize: 16, fontWeight: 700, color }}>{weights[key]}%</span>
                    </div>
                    <input type="range" min={0} max={100} value={weights[key]}
                      onChange={e => setWeights(prev => ({ ...prev, [key]: +e.target.value }))}
                      style={{ width: "100%", accentColor: color, background: t.inputBg }} />
                  </div>
                ))}
                <div style={{ display: "flex", height: 12, borderRadius: 99, overflow: "hidden", gap: 2 }}>
                  {[{ key: "prayers", color: t.gold }, { key: "exercise", color: t.green }, { key: "reading", color: t.purple }].map(({ key, color }) => (
                    <div key={key} style={{ flex: weights[key], background: color, minWidth: weights[key] > 0 ? 4 : 0, transition: "flex 0.3s" }} />
                  ))}
                  {remaining > 0 && <div style={{ flex: remaining, background: t.border }} />}
                </div>
              </div>

              {/* jamaa ratio */}
              <div style={card}>
                <div style={{ fontSize: 13, color: t.gold, marginBottom: 6, fontWeight: 700 }}>نسبة الصلاة منفرداً</div>
                <div style={{ fontSize: 12, color: t.sub, marginBottom: 14, lineHeight: 1.7 }}>جماعة = 100% | منفرد = النسبة أدناه</div>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                  <span style={{ fontSize: 13 }}>منفرد يساوي</span>
                  <span style={{ fontSize: 16, fontWeight: 700, color: t.gold }}>{Math.round(jamaaRatio * 100)}%</span>
                </div>
                <input type="range" min={10} max={90} value={Math.round(jamaaRatio * 100)}
                  onChange={e => setJamaaRatio(e.target.value / 100)}
                  style={{ width: "100%", accentColor: t.gold, background: t.inputBg }} />
              </div>
            </>}

            {settingsTab === "habits" && <>
              {/* add new habit */}
              <div style={card}>
                <div style={{ fontSize: 13, color: t.gold, marginBottom: 14, fontWeight: 700 }}>إضافة عادة جديدة</div>

                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 11, color: t.sub, marginBottom: 6 }}>اسم العادة</div>
                  <input type="text" placeholder="مثال: قراءة القرآن، التدخين..." value={newHabit.label}
                    onChange={e => setNewHabit(prev => ({ ...prev, label: e.target.value }))}
                    style={{ width: "100%", background: t.inputBg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, ...font }} />
                </div>

                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 11, color: t.sub, marginBottom: 6 }}>الأيقونة</div>
                  <input type="text" placeholder="⭐" value={newHabit.icon}
                    onChange={e => setNewHabit(prev => ({ ...prev, icon: e.target.value }))}
                    style={{ width: 60, background: t.inputBg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 20, textAlign: "center" }} />
                </div>

                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 11, color: t.sub, marginBottom: 8 }}>النوع</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => setNewHabit(prev => ({ ...prev, type: "add" }))} style={{
                      flex: 1, padding: "10px", borderRadius: 10, cursor: "pointer", fontSize: 12, fontWeight: 600,
                      background: newHabit.type === "add" ? t.green + "20" : t.inputBg,
                      border: `2px solid ${newHabit.type === "add" ? t.green : t.border}`,
                      color: newHabit.type === "add" ? t.green : t.sub,
                    }}>✅ عادة إيجابية (تضيف)</button>
                    <button onClick={() => setNewHabit(prev => ({ ...prev, type: "sub" }))} style={{
                      flex: 1, padding: "10px", borderRadius: 10, cursor: "pointer", fontSize: 12, fontWeight: 600,
                      background: newHabit.type === "sub" ? t.red + "20" : t.inputBg,
                      border: `2px solid ${newHabit.type === "sub" ? t.red : t.border}`,
                      color: newHabit.type === "sub" ? t.red : t.sub,
                    }}>❌ عادة سيئة (تخصم)</button>
                  </div>
                </div>

                <div style={{ marginBottom: 16 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <span style={{ fontSize: 11, color: t.sub }}>النسبة المؤثرة</span>
                    <span style={{ fontSize: 15, fontWeight: 700, color: newHabit.type === "add" ? t.green : t.red }}>
                      {newHabit.type === "add" ? "+" : "-"}{newHabit.value}%
                    </span>
                  </div>
                  <input type="range" min={1} max={30} value={newHabit.value}
                    onChange={e => setNewHabit(prev => ({ ...prev, value: +e.target.value }))}
                    style={{ width: "100%", accentColor: newHabit.type === "add" ? t.green : t.red, background: t.inputBg }} />
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: t.faint, marginTop: 4 }}>
                    <span>1%</span><span>30%</span>
                  </div>
                </div>

                <button onClick={addHabit} style={{
                  width: "100%", padding: "12px", borderRadius: 12, cursor: "pointer", fontSize: 14, fontWeight: 700,
                  background: newHabit.label.trim() ? t.gold : t.border,
                  border: "none", color: newHabit.label.trim() ? "#fff" : t.sub,
                  transition: "all 0.2s",
                }}>+ إضافة العادة</button>
              </div>

              {/* existing habits */}
              {customHabits.length > 0 && (
                <div style={card}>
                  <div style={{ fontSize: 13, color: t.sub, marginBottom: 14 }}>العادات المضافة ({customHabits.length})</div>
                  {customHabits.map(h => (
                    <div key={h.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: `1px solid ${t.border}` }}>
                      <span style={{ fontSize: 22 }}>{h.icon}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: t.text }}>{h.label}</div>
                        <div style={{ fontSize: 11, color: h.value > 0 ? t.green : t.red, marginTop: 2 }}>
                          {h.value > 0 ? `+${h.value}%` : `${h.value}%`} {h.value > 0 ? "إيجابية" : "سلبية"}
                        </div>
                      </div>
                      <button onClick={() => deleteHabit(h.id)} style={{ background: t.red + "20", border: `1px solid ${t.red}30`, borderRadius: 8, color: t.red, padding: "4px 10px", cursor: "pointer", fontSize: 12 }}>حذف</button>
                    </div>
                  ))}
                </div>
              )}

              {customHabits.length === 0 && (
                <div style={{ textAlign: "center", padding: "30px 0", color: t.faint, fontSize: 13 }}>
                  لا توجد عادات مضافة بعد<br/>أضف عادتك الأولى من الأعلى 👆
                </div>
              )}
            </>}

            <div style={{ textAlign: "center", fontSize: 12, color: t.faint, marginTop: 8 }}>✓ التغييرات تُحفظ تلقائياً</div>
          </div>
        </div>
      );

      // ── HOME ──
      return (
        <div style={{ minHeight: "100vh", background: t.bg, color: t.text, direction: "rtl", ...font }}>
          <div style={{ maxWidth: 480, margin: "0 auto", padding: "24px 16px 70px" }}>

            {/* header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 22 }}>
              <div>
                <div style={{ fontSize: 10, letterSpacing: 4, color: t.gold, fontFamily: "monospace", marginBottom: 4 }}>مسار النجاح</div>
                <h1 style={{ fontSize: 24, margin: 0, fontWeight: 700, background: `linear-gradient(135deg,${darkMode?"#f5e6c8":t.text},${t.gold},${darkMode?"#f5e6c8":t.text})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>روتيني اليومي</h1>
                <div style={{ fontSize: 11, color: t.sub, marginTop: 3 }}>{new Date().toLocaleDateString("ar-SA", { weekday: "long", month: "long", day: "numeric" })}</div>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <button onClick={() => setDarkMode(!darkMode)} style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 10, color: t.sub, padding: "8px 10px", cursor: "pointer", fontSize: 16 }}>
                  {darkMode ? "☀️" : "🌙"}
                </button>
                <button onClick={() => setPage("settings")} style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 12, color: t.sub, padding: "8px 14px", cursor: "pointer", fontSize: 12 }}>⚙️</button>
              </div>
            </div>

            {/* score */}
            <div style={{ ...card, display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ position: "relative", flexShrink: 0 }}>
                <ScoreRing score={score} dark={darkMode} />
                <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ fontSize: 28, fontWeight: 900, color: scoreColor, lineHeight: 1 }}>{score}</span>
                  <span style={{ fontSize: 10, color: t.sub }}>/ 100</span>
                </div>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: scoreColor, marginBottom: 4 }}>{scoreLabel}</div>
                <div style={{ fontSize: 11, color: t.sub, marginBottom: 12 }}>تقييمك اليوم</div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ fontSize: 26, filter: streak > 0 ? "none" : "grayscale(1) opacity(0.3)" }}>
                    {streak >= 30 ? "👑" : streak >= 14 ? "🔥" : streak >= 7 ? "⚡" : streak > 0 ? "🌙" : "💤"}
                  </div>
                  <div>
                    <div style={{ display: "flex", alignItems: "baseline", gap: 4 }}>
                      <span style={{ fontSize: 22, fontWeight: 900, color: streak > 0 ? t.gold : t.faint }}>{streak}</span>
                      <span style={{ fontSize: 11, color: t.sub }}>يوم متتالي</span>
                    </div>
                    <div style={{ fontSize: 9, color: t.faint }}>سلسلة كاملة 100%</div>
                  </div>
                </div>
              </div>
            </div>

            {/* prayers */}
            <div style={{ marginBottom: 14 }}>
              <div style={secLabel}>
                <div style={{ flex: 1, height: 1, background: t.border }} />
                الصلوات الخمس <span style={{ fontSize: 9, color: t.gold + "80" }}>({weights.prayers}%)</span>
                <div style={{ flex: 1, height: 1, background: t.border }} />
              </div>
              <div style={{ display: "flex", gap: 8, marginBottom: 10, fontSize: 9, color: t.sub, flexWrap: "wrap" }}>
                <span>⬜ لم يُصَلَّ</span>
                <span style={{ color: t.purple }}>🟣 منفرد ({Math.round(jamaaRatio * 100)}%)</span>
                <span style={{ color: t.gold }}>🟡 جماعة (100%)</span>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {PRAYER_IDS.map((id, i) => {
                  const state = todayData[id];
                  const isJamaa = state === "jamaa", isSolo = state === "solo";
                  const color = isJamaa ? t.gold : isSolo ? t.purple : t.faint;
                  const pts = isJamaa ? weights.prayers / 5 : isSolo ? (weights.prayers / 5 * jamaaRatio) : 0;
                  return (
                    <button key={id} onClick={() => cyclePrayer(id)} style={{
                      gridColumn: i === 4 ? "1 / -1" : "auto",
                      background: isJamaa ? (darkMode?"linear-gradient(135deg,#1a1200,#2a1e00)":t.gold+"15") : isSolo ? (darkMode?"linear-gradient(135deg,#120f1e,#1e1530)":t.purple+"15") : t.card,
                      border: `1px solid ${isJamaa ? t.gold+"50" : isSolo ? t.purple+"50" : t.border}`,
                      borderRadius: 14, padding: "12px 14px", cursor: "pointer", textAlign: "right", color: "inherit",
                      transition: "all 0.3s ease",
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between" }}>
                        <span style={{ fontSize: 18 }}>{PRAYERS_META[id].icon}</span>
                        <span style={{ fontSize: 10, color, background: color + "20", borderRadius: 6, padding: "2px 6px", fontWeight: 700 }}>+{pts.toFixed(1)}</span>
                      </div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: (isJamaa||isSolo) ? color : t.sub, marginTop: 6 }}>{PRAYERS_META[id].label}</div>
                      <div style={{ marginTop: 6, fontSize: 10, color: (isJamaa||isSolo) ? color+"90" : t.faint }}>
                        {isJamaa ? "✓ جماعة" : isSolo ? "✓ منفرد" : "اضغط للتسجيل"}
                      </div>
                    </button>
                  );
                })}
              </div>
              <div style={{ fontSize: 9, color: t.faint, textAlign: "center", marginTop: 8 }}>ضغطة = منفرد | ضغطتان = جماعة | ثلاث = إلغاء</div>
            </div>

            {/* exercise */}
            <div style={{ marginBottom: 14 }}>
              <div style={secLabel}>
                <div style={{ flex: 1, height: 1, background: t.border }} />
                التمرين <span style={{ fontSize: 9, color: t.green + "80" }}>({weights.exercise}%)</span>
                <div style={{ flex: 1, height: 1, background: t.border }} />
              </div>
              <button onClick={toggleExercise} style={{
                width: "100%", background: todayData.exercise ? (darkMode?"linear-gradient(135deg,#001a12,#002a1e)":t.green+"15") : t.card,
                border: `1px solid ${todayData.exercise ? t.green+"50" : t.border}`, borderRadius: 14,
                padding: "14px 18px", cursor: "pointer", textAlign: "right", color: "inherit",
                display: "flex", alignItems: "center", gap: 14, transition: "all 0.3s ease",
              }}>
                <span style={{ fontSize: 26 }}>💪</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: todayData.exercise ? t.green : t.sub }}>التمرين اليومي</div>
                  <div style={{ fontSize: 10, color: todayData.exercise ? t.green+"60" : t.faint, marginTop: 3 }}>{todayData.exercise ? "✓ تم" : "اضغط للتسجيل"}</div>
                </div>
                <span style={{ fontSize: 11, color: todayData.exercise ? t.green : t.faint, background: todayData.exercise ? t.green+"15" : t.inputBg, borderRadius: 8, padding: "4px 10px", fontWeight: 700 }}>
                  +{todayData.exercise ? weights.exercise : 0}
                </span>
              </button>
            </div>

            {/* reading */}
            <div style={{ marginBottom: 14 }}>
              <div style={secLabel}>
                <div style={{ flex: 1, height: 1, background: t.border }} />
                القراءة <span style={{ fontSize: 9, color: t.purple + "80" }}>({weights.reading}%)</span>
                <div style={{ flex: 1, height: 1, background: t.border }} />
              </div>
              <div style={card}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 20 }}>📖</span>
                    <span style={{ fontSize: 13, fontWeight: 600, color: t.sub }}>نسبة القراءة</span>
                  </div>
                  <div style={{ textAlign: "left" }}>
                    <span style={{ fontSize: 22, fontWeight: 900, color: t.purple }}>{todayData.readingPct ?? 0}%</span>
                    <div style={{ fontSize: 10, color: t.faint }}>+{(((todayData.readingPct??0)/100)*weights.reading).toFixed(1)} نقطة</div>
                  </div>
                </div>
                <input type="range" min={0} max={100} step={5} value={todayData.readingPct ?? 0}
                  onChange={e => setReadingPct(+e.target.value)}
                  style={{ width: "100%", accentColor: t.purple, marginBottom: 10, background: t.inputBg }} />
                <div style={{ display: "flex", gap: 6 }}>
                  {[0, 25, 50, 75, 100].map(v => (
                    <button key={v} onClick={() => setReadingPct(v)} style={{
                      flex: 1, padding: "6px 0", borderRadius: 8, cursor: "pointer", fontSize: 11,
                      border: `1px solid ${(todayData.readingPct??0)===v ? t.purple : t.border}`,
                      background: (todayData.readingPct??0)===v ? t.purple+"20" : t.inputBg,
                      color: (todayData.readingPct??0)===v ? t.purple : t.sub,
                    }}>{v}%</button>
                  ))}
                </div>
              </div>
            </div>

            {/* custom habits */}
            {customHabits.length > 0 && (
              <div style={{ marginBottom: 14 }}>
                <div style={secLabel}>
                  <div style={{ flex: 1, height: 1, background: t.border }} />
                  عاداتي المخصصة
                  <div style={{ flex: 1, height: 1, background: t.border }} />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  {customHabits.map(h => {
                    const done = !!todayData[`custom_${h.id}`];
                    const color = h.value > 0 ? t.green : t.red;
                    return (
                      <button key={h.id} onClick={() => toggleCustom(h.id)} style={{
                        background: done ? (h.value > 0 ? (darkMode?"linear-gradient(135deg,#001a12,#002a1e)":t.green+"15") : (darkMode?"linear-gradient(135deg,#1a0000,#2a0000)":t.red+"15")) : t.card,
                        border: `1px solid ${done ? color+"50" : t.border}`,
                        borderRadius: 14, padding: "12px 14px", cursor: "pointer", textAlign: "right", color: "inherit",
                        transition: "all 0.3s ease",
                      }}>
                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                          <span style={{ fontSize: 18 }}>{h.icon}</span>
                          <span style={{ fontSize: 10, color, background: color+"20", borderRadius: 6, padding: "2px 6px", fontWeight: 700 }}>
                            {h.value > 0 ? `+${h.value}` : h.value}
                          </span>
                        </div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: done ? color : t.sub, marginTop: 6 }}>{h.label}</div>
                        <div style={{ marginTop: 6, fontSize: 10, color: done ? color+"90" : t.faint }}>
                          {done ? "✓ تم" : "اضغط للتسجيل"}
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* last 7 */}
            <div style={{ ...card, marginBottom: 14 }}>
              <div style={{ fontSize: 12, color: t.sub, marginBottom: 14 }}>آخر ٧ أيام</div>
              <div style={{ display: "flex", gap: 6 }}>
                {last7.map(day => {
                  const c = day.score >= 90 ? t.gold : day.score >= 70 ? t.green : day.score >= 50 ? t.purple : day.score > 0 ? t.red : t.border;
                  return (
                    <div key={day.key} style={{ flex: 1, textAlign: "center" }}>
                      <div style={{ fontSize: 9, color: day.isToday ? t.gold : t.faint, marginBottom: 4 }}>{day.score > 0 ? day.score+"%" : ""}</div>
                      <div style={{ height: 52, background: t.inputBg, borderRadius: 8, position: "relative", overflow: "hidden", marginBottom: 4, border: day.isToday ? `1px solid ${t.gold}40` : `1px solid ${t.border}` }}>
                        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: `${day.score}%`, background: c, borderRadius: "6px 6px 0 0", opacity: 0.85 }} />
                      </div>
                      <div style={{ fontSize: 9, color: day.isToday ? t.gold : t.faint }}>{day.label}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* quote */}
            <div style={{ textAlign: "center", padding: "14px 16px", borderTop: `1px solid ${t.border}` }}>
              <div style={{ fontSize: 10, color: t.faint, marginBottom: 6 }}>✦ تذكير ✦</div>
              <div style={{ fontSize: 13, color: t.sub, lineHeight: 1.8, fontStyle: "italic" }}>"{quote}"</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
