<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="روتيني" />
  <link rel="manifest" href="manifest.json" />
  <title>روتيني اليومي</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; }
    button:active { opacity: 0.8; }
    input[type=range] { -webkit-appearance: none; height: 6px; border-radius: 99px; outline: none; background: #1a1a24; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const PRAYER_IDS = ["fajr", "dhuhr", "asr", "maghrib", "isha"];
    const PRAYERS_META = {
      fajr:    { label: "الفجر",   icon: "🌙" },
      dhuhr:   { label: "الظهر",   icon: "☀️" },
      asr:     { label: "العصر",   icon: "🌤" },
      maghrib: { label: "المغرب",  icon: "🌇" },
      isha:    { label: "العشاء",  icon: "⭐" },
    };

    const DEFAULT_WEIGHTS = { prayers: 50, exercise: 30, reading: 20 };
    const DEFAULT_JAMAA_RATIO = 0.6;

    const QUOTES = [
      "كل يوم ملتزم هو لبنة في بناء نفسك",
      "الانضباط اليوم حرية الغد",
      "الناجحون لا يشعرون بالتحفيز دائماً، لكنهم يتصرفون رغم ذلك",
      "الروتين الجيد يصنع الإنسان العظيم",
      "ابدأ صغيراً، وكن ثابتاً، والنتائج ستبهرك",
    ];

    function getTodayKey() { return new Date().toISOString().split("T")[0]; }

    function calcDayScore(dayData, weights, jamaaRatio) {
      let score = 0;
      const perPrayer = weights.prayers / 5;
      PRAYER_IDS.forEach(id => {
        const state = dayData?.[id];
        if (state === "jamaa") score += perPrayer;
        else if (state === "solo") score += perPrayer * jamaaRatio;
      });
      if (dayData?.exercise) score += weights.exercise;
      score += ((dayData?.readingPct ?? 0) / 100) * weights.reading;
      return Math.round(score);
    }

    function getStreak(history, weights, jamaaRatio) {
      let streak = 0;
      const today = new Date();
      for (let i = 0; i < 365; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        const key = d.toISOString().split("T")[0];
        if (i === 0 && !history[key]) break;
        if (!history[key]) break;
        if (calcDayScore(history[key], weights, jamaaRatio) < 100) break;
        streak++;
      }
      return streak;
    }

    function getLast7(history, weights, jamaaRatio) {
      const days = [];
      const today = new Date();
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        const key = d.toISOString().split("T")[0];
        const score = calcDayScore(history[key] || {}, weights, jamaaRatio);
        const label = d.toLocaleDateString("ar-SA", { weekday: "short" });
        days.push({ key, score, label, isToday: i === 0 });
      }
      return days;
    }

    function ScoreRing({ score }) {
      const r = 54, circ = 2 * Math.PI * r;
      const dash = (score / 100) * circ;
      const color = score >= 90 ? "#c9a84c" : score >= 70 ? "#4caf8a" : score >= 50 ? "#7a5fd4" : "#c0392b";
      return (
        <svg width={130} height={130} viewBox="0 0 130 130" style={{ transform: "rotate(-90deg)" }}>
          <circle cx={65} cy={65} r={r} fill="none" stroke="#1a1a24" strokeWidth={10} />
          <circle cx={65} cy={65} r={r} fill="none" stroke={color} strokeWidth={10}
            strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
            style={{ transition: "stroke-dasharray 0.8s ease, stroke 0.4s" }} />
        </svg>
      );
    }

    function App() {
      const [page, setPage] = useState("home");
      const [weights, setWeights] = useState(() => {
        try { return JSON.parse(localStorage.getItem("rw") || "null") || DEFAULT_WEIGHTS; }
        catch { return DEFAULT_WEIGHTS; }
      });
      const [jamaaRatio, setJamaaRatio] = useState(() => {
        const v = parseFloat(localStorage.getItem("rj"));
        return isNaN(v) ? DEFAULT_JAMAA_RATIO : v;
      });
      const [history, setHistory] = useState(() => {
        try { return JSON.parse(localStorage.getItem("rh") || "{}"); }
        catch { return {}; }
      });

      const todayKey = getTodayKey();
      const todayData = history[todayKey] || {};
      const score = calcDayScore(todayData, weights, jamaaRatio);
      const streak = getStreak(history, weights, jamaaRatio);
      const last7 = getLast7(history, weights, jamaaRatio);
      const quote = QUOTES[new Date().getDay() % QUOTES.length];
      const totalW = weights.prayers + weights.exercise + weights.reading;
      const remaining = 100 - totalW;

      useEffect(() => { localStorage.setItem("rh", JSON.stringify(history)); }, [history]);
      useEffect(() => { localStorage.setItem("rw", JSON.stringify(weights)); }, [weights]);
      useEffect(() => { localStorage.setItem("rj", String(jamaaRatio)); }, [jamaaRatio]);

      function cyclePrayer(id) {
        const cur = todayData[id];
        const next = cur === undefined ? "solo" : cur === "solo" ? "jamaa" : undefined;
        setHistory(prev => ({ ...prev, [todayKey]: { ...prev[todayKey], [id]: next } }));
      }
      function toggleExercise() {
        setHistory(prev => ({ ...prev, [todayKey]: { ...prev[todayKey], exercise: !prev[todayKey]?.exercise } }));
      }
      function setReadingPct(val) {
        setHistory(prev => ({ ...prev, [todayKey]: { ...prev[todayKey], readingPct: val } }));
      }

      const scoreColor = score >= 90 ? "#c9a84c" : score >= 70 ? "#4caf8a" : score >= 50 ? "#7a5fd4" : "#c0392b";
      const scoreLabel = score >= 90 ? "ممتاز 🏆" : score >= 70 ? "جيد جداً ⚡" : score >= 50 ? "مقبول 📈" : "ضعيف 💪";
      const card = { background: "#0e0e16", border: "1px solid #1e1e2a", borderRadius: 18, padding: "16px 18px", marginBottom: 14 };
      const secLabel = { fontSize: 11, letterSpacing: 3, color: "#6b6580", marginBottom: 12, display: "flex", alignItems: "center", gap: 8 };
      const font = { fontFamily: "'Noto Naskh Arabic','Amiri',Georgia,serif" };

      if (page === "settings") return (
        <div style={{ minHeight: "100vh", background: "#0a0a0f", color: "#e8e0d0", direction: "rtl", ...font }}>
          <div style={{ maxWidth: 480, margin: "0 auto", padding: "24px 16px 70px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 28 }}>
              <button onClick={() => setPage("home")} style={{ background: "none", border: "1px solid #2a2a3a", borderRadius: 10, color: "#c9a84c", padding: "6px 14px", cursor: "pointer", fontSize: 13 }}>← رجوع</button>
              <h2 style={{ margin: 0, fontSize: 20, color: "#f5e6c8" }}>الإعدادات</h2>
            </div>
            <div style={card}>
              <div style={{ fontSize: 13, color: "#c9a84c", marginBottom: 4, fontWeight: 700 }}>توزيع النسب (المجموع: {totalW}%)</div>
              {remaining !== 0 && (
                <div style={{ fontSize: 11, color: remaining > 0 ? "#e67e22" : "#c0392b", background: "#1a1000", borderRadius: 8, padding: "6px 10px", marginBottom: 12 }}>
                  {remaining > 0 ? `⚠️ تبقى ${remaining}% غير موزعة` : `⚠️ تجاوزت الـ 100% بمقدار ${-remaining}%`}
                </div>
              )}
              {[{ key: "prayers", label: "الصلوات 🕌", color: "#c9a84c" }, { key: "exercise", label: "التمرين 💪", color: "#4caf8a" }, { key: "reading", label: "القراءة 📖", color: "#7a5fd4" }].map(({ key, label, color }) => (
                <div key={key} style={{ marginBottom: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <span style={{ fontSize: 13 }}>{label}</span>
                    <span style={{ fontSize: 16, fontWeight: 700, color }}>{weights[key]}%</span>
                  </div>
                  <input type="range" min={0} max={100} value={weights[key]}
                    onChange={e => setWeights(prev => ({ ...prev, [key]: +e.target.value }))}
                    style={{ width: "100%", accentColor: color }} />
                </div>
              ))}
              <div style={{ display: "flex", height: 12, borderRadius: 99, overflow: "hidden", gap: 2 }}>
                {[{ key: "prayers", color: "#c9a84c" }, { key: "exercise", color: "#4caf8a" }, { key: "reading", color: "#7a5fd4" }].map(({ key, color }) => (
                  <div key={key} style={{ flex: weights[key], background: color, minWidth: weights[key] > 0 ? 4 : 0 }} />
                ))}
                {remaining > 0 && <div style={{ flex: remaining, background: "#1a1a24" }} />}
              </div>
            </div>
            <div style={card}>
              <div style={{ fontSize: 13, color: "#c9a84c", marginBottom: 6, fontWeight: 700 }}>نسبة الصلاة منفرداً</div>
              <div style={{ fontSize: 12, color: "#6b6580", marginBottom: 14, lineHeight: 1.7 }}>جماعة = 100% | منفرد = النسبة أدناه</div>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <span style={{ fontSize: 13 }}>منفرد يساوي</span>
                <span style={{ fontSize: 16, fontWeight: 700, color: "#c9a84c" }}>{Math.round(jamaaRatio * 100)}%</span>
              </div>
              <input type="range" min={10} max={90} value={Math.round(jamaaRatio * 100)}
                onChange={e => setJamaaRatio(e.target.value / 100)}
                style={{ width: "100%", accentColor: "#c9a84c" }} />
            </div>
            <div style={{ textAlign: "center", fontSize: 12, color: "#3a3a4a" }}>✓ التغييرات تُحفظ تلقائياً</div>
          </div>
        </div>
      );

      return (
        <div style={{ minHeight: "100vh", background: "#0a0a0f", color: "#e8e0d0", direction: "rtl", ...font }}>
          <div style={{ maxWidth: 480, margin: "0 auto", padding: "24px 16px 70px" }}>

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 22 }}>
              <div>
                <div style={{ fontSize: 10, letterSpacing: 4, color: "#c9a84c", fontFamily: "monospace", marginBottom: 4 }}>مسار النجاح</div>
                <h1 style={{ fontSize: 24, margin: 0, fontWeight: 700, background: "linear-gradient(135deg,#f5e6c8,#c9a84c,#f5e6c8)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>روتيني اليومي</h1>
                <div style={{ fontSize: 11, color: "#4a4a5a", marginTop: 3 }}>{new Date().toLocaleDateString("ar-SA", { weekday: "long", month: "long", day: "numeric" })}</div>
              </div>
              <button onClick={() => setPage("settings")} style={{ background: "#0e0e16", border: "1px solid #2a2a3a", borderRadius: 12, color: "#8a8a9a", padding: "8px 14px", cursor: "pointer", fontSize: 12 }}>⚙️ إعدادات</button>
            </div>

            <div style={{ ...card, display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ position: "relative", flexShrink: 0 }}>
                <ScoreRing score={score} />
                <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ fontSize: 28, fontWeight: 900, color: scoreColor, lineHeight: 1 }}>{score}</span>
                  <span style={{ fontSize: 10, color: "#6b6580" }}>/ 100</span>
                </div>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: scoreColor, marginBottom: 4 }}>{scoreLabel}</div>
                <div style={{ fontSize: 11, color: "#6b6580", marginBottom: 12 }}>تقييمك اليوم</div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ fontSize: 26, filter: streak > 0 ? "none" : "grayscale(1) opacity(0.3)" }}>
                    {streak >= 30 ? "👑" : streak >= 14 ? "🔥" : streak >= 7 ? "⚡" : streak > 0 ? "🌙" : "💤"}
                  </div>
                  <div>
                    <div style={{ display: "flex", alignItems: "baseline", gap: 4 }}>
                      <span style={{ fontSize: 22, fontWeight: 900, color: streak > 0 ? "#c9a84c" : "#333" }}>{streak}</span>
                      <span style={{ fontSize: 11, color: "#6b6580" }}>يوم متتالي</span>
                    </div>
                    <div style={{ fontSize: 9, color: "#3a3a4a" }}>سلسلة كاملة 100%</div>
                  </div>
                </div>
              </div>
            </div>

            <div style={{ marginBottom: 14 }}>
              <div style={secLabel}>
                <div style={{ flex: 1, height: 1, background: "#1e1e2a" }} />
                الصلوات الخمس <span style={{ fontSize: 9, color: "#c9a84c80" }}>({weights.prayers}%)</span>
                <div style={{ flex: 1, height: 1, background: "#1e1e2a" }} />
              </div>
              <div style={{ display: "flex", gap: 10, marginBottom: 10, fontSize: 9, color: "#5a5a6a", flexWrap: "wrap" }}>
                <span>⬜ لم يُصَلَّ</span>
                <span style={{ color: "#7a5fd4" }}>🟣 منفرد ({Math.round(jamaaRatio * 100)}%)</span>
                <span style={{ color: "#c9a84c" }}>🟡 جماعة (100%)</span>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {PRAYER_IDS.map((id, i) => {
                  const state = todayData[id];
                  const isJamaa = state === "jamaa", isSolo = state === "solo";
                  const color = isJamaa ? "#c9a84c" : isSolo ? "#7a5fd4" : "#3a3a4a";
                  const pts = isJamaa ? weights.prayers / 5 : isSolo ? (weights.prayers / 5 * jamaaRatio) : 0;
                  return (
                    <button key={id} onClick={() => cyclePrayer(id)} style={{
                      gridColumn: i === 4 ? "1 / -1" : "auto",
                      background: isJamaa ? "linear-gradient(135deg,#1a1200,#2a1e00)" : isSolo ? "linear-gradient(135deg,#120f1e,#1e1530)" : "#0e0e16",
                      border: `1px solid ${isJamaa ? "#c9a84c50" : isSolo ? "#7a5fd450" : "#1e1e2a"}`,
                      borderRadius: 14, padding: "12px 14px", cursor: "pointer", textAlign: "right", color: "inherit",
                      transition: "all 0.3s ease",
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between" }}>
                        <span style={{ fontSize: 18 }}>{PRAYERS_META[id].icon}</span>
                        <span style={{ fontSize: 10, color, background: color + "20", borderRadius: 6, padding: "2px 6px", fontWeight: 700 }}>+{pts.toFixed(1)}</span>
                      </div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: (isJamaa || isSolo) ? color : "#6a6a7a", marginTop: 6 }}>{PRAYERS_META[id].label}</div>
                      <div style={{ marginTop: 6, fontSize: 10, color: (isJamaa || isSolo) ? color + "90" : "#2a2a3a" }}>
                        {isJamaa ? "✓ جماعة" : isSolo ? "✓ منفرد" : "اضغط للتسجيل"}
                      </div>
                    </button>
                  );
                })}
              </div>
              <div style={{ fontSize: 9, color: "#3a3a4a", textAlign: "center", marginTop: 8 }}>ضغطة = منفرد | ضغطتان = جماعة | ثلاث = إلغاء</div>
            </div>

            <div style={{ marginBottom: 14 }}>
              <div style={secLabel}>
                <div style={{ flex: 1, height: 1, background: "#1e1e2a" }} />
                التمرين <span style={{ fontSize: 9, color: "#4caf8a80" }}>({weights.exercise}%)</span>
                <div style={{ flex: 1, height: 1, background: "#1e1e2a" }} />
              </div>
              <button onClick={toggleExercise} style={{
                width: "100%", background: todayData.exercise ? "linear-gradient(135deg,#001a12,#002a1e)" : "#0e0e16",
                border: `1px solid ${todayData.exercise ? "#4caf8a50" : "#1e1e2a"}`, borderRadius: 14,
                padding: "14px 18px", cursor: "pointer", textAlign: "right", color: "inherit",
                display: "flex", alignItems: "center", gap: 14, transition: "all 0.3s ease",
              }}>
                <span style={{ fontSize: 26 }}>💪</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: todayData.exercise ? "#4caf8a" : "#6a6a7a" }}>التمرين اليومي</div>
                  <div style={{ fontSize: 10, color: todayData.exercise ? "#4caf8a60" : "#2a2a3a", marginTop: 3 }}>{todayData.exercise ? "✓ تم" : "اضغط للتسجيل"}</div>
                </div>
                <span style={{ fontSize: 11, color: todayData.exercise ? "#4caf8a" : "#2a2a3a", background: todayData.exercise ? "#4caf8a15" : "#1a1a24", borderRadius: 8, padding: "4px 10px", fontWeight: 700 }}>
                  +{todayData.exercise ? weights.exercise : 0}
                </span>
              </button>
            </div>

            <div style={{ marginBottom: 14 }}>
              <div style={secLabel}>
                <div style={{ flex: 1, height: 1, background: "#1e1e2a" }} />
                القراءة <span style={{ fontSize: 9, color: "#7a5fd480" }}>({weights.reading}%)</span>
                <div style={{ flex: 1, height: 1, background: "#1e1e2a" }} />
              </div>
              <div style={card}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 20 }}>📖</span>
                    <span style={{ fontSize: 13, fontWeight: 600, color: "#8a8a9a" }}>نسبة القراءة</span>
                  </div>
                  <div style={{ textAlign: "left" }}>
                    <span style={{ fontSize: 22, fontWeight: 900, color: "#7a5fd4" }}>{todayData.readingPct ?? 0}%</span>
                    <div style={{ fontSize: 10, color: "#4a4a5a" }}>+{(((todayData.readingPct ?? 0) / 100) * weights.reading).toFixed(1)} نقطة</div>
                  </div>
                </div>
                <input type="range" min={0} max={100} step={5} value={todayData.readingPct ?? 0}
                  onChange={e => setReadingPct(+e.target.value)}
                  style={{ width: "100%", accentColor: "#7a5fd4", marginBottom: 10 }} />
                <div style={{ display: "flex", gap: 6 }}>
                  {[0, 25, 50, 75, 100].map(v => (
                    <button key={v} onClick={() => setReadingPct(v)} style={{
                      flex: 1, padding: "6px 0", borderRadius: 8, cursor: "pointer", fontSize: 11,
                      border: `1px solid ${(todayData.readingPct ?? 0) === v ? "#7a5fd4" : "#1e1e2a"}`,
                      background: (todayData.readingPct ?? 0) === v ? "#7a5fd420" : "#0a0a12",
                      color: (todayData.readingPct ?? 0) === v ? "#7a5fd4" : "#4a4a5a",
                    }}>{v}%</button>
                  ))}
                </div>
              </div>
            </div>

            <div style={{ ...card, marginBottom: 14 }}>
              <div style={{ fontSize: 12, color: "#6b6580", marginBottom: 14 }}>آخر ٧ أيام</div>
              <div style={{ display: "flex", gap: 6 }}>
                {last7.map(day => {
                  const c = day.score >= 90 ? "#c9a84c" : day.score >= 70 ? "#4caf8a" : day.score >= 50 ? "#7a5fd4" : day.score > 0 ? "#c0392b" : "#1a1a24";
                  return (
                    <div key={day.key} style={{ flex: 1, textAlign: "center" }}>
                      <div style={{ fontSize: 9, color: day.isToday ? "#c9a84c" : "#3a3a4a", marginBottom: 4 }}>{day.score > 0 ? day.score + "%" : ""}</div>
                      <div style={{ height: 52, background: "#0a0a12", borderRadius: 8, position: "relative", overflow: "hidden", marginBottom: 4, border: day.isToday ? "1px solid #c9a84c40" : "1px solid transparent" }}>
                        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: `${day.score}%`, background: c, borderRadius: "6px 6px 0 0", opacity: 0.85 }} />
                      </div>
                      <div style={{ fontSize: 9, color: day.isToday ? "#c9a84c" : "#3a3a4a" }}>{day.label}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{ textAlign: "center", padding: "14px 16px", borderTop: "1px solid #1e1e2a" }}>
              <div style={{ fontSize: 10, color: "#3a3a4a", marginBottom: 6 }}>✦ تذكير ✦</div>
              <div style={{ fontSize: 13, color: "#5a5560", lineHeight: 1.8, fontStyle: "italic" }}>"{quote}"</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
